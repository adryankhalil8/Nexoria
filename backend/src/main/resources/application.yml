spring:
  application:
    name: nexoria-api
  datasource:
    url: jdbc:mysql://${DB_HOST}:${DB_PORT}/${DB_NAME}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
      show-details: when_authorized
  info:
    env:
      enabled: true

info:
  app:
    name: Nexoria API
    description: Blueprint diagnostics and authentication service.
    version: 0.1.0

springdoc:
  swagger-ui:
    path: /swagger-ui.html

app:
  security:
    cors:
      allowed-origin-patterns:
        - ${APP_CORS_ALLOWED_ORIGIN_1:http://localhost:3000}
        - ${APP_CORS_ALLOWED_ORIGIN_2:http://localhost:8080}
      allowed-methods:
        - GET
        - POST
        - PUT
        - PATCH
        - DELETE
        - OPTIONS
      allowed-headers:
        - "*"
      allow-credentials: true
    headers:
      content-security-policy: "${APP_SECURITY_CSP:default-src 'self'; frame-ancestors 'none'; object-src 'none'; base-uri 'self'; img-src 'self' data: https:; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https:; connect-src 'self' http://localhost:3000 http://localhost:8080;}"
      referrer-policy: ${APP_SECURITY_REFERRER_POLICY:strict-origin-when-cross-origin}
      permissions-policy: ${APP_SECURITY_PERMISSIONS_POLICY:camera=(), geolocation=(), microphone=()}
      hsts-enabled: ${APP_SECURITY_HSTS_ENABLED:true}
      hsts-max-age-seconds: ${APP_SECURITY_HSTS_MAX_AGE_SECONDS:31536000}
      hsts-include-subdomains: ${APP_SECURITY_HSTS_INCLUDE_SUBDOMAINS:true}
  rate-limit:
    auth:
      enabled: ${APP_RATE_LIMIT_AUTH_ENABLED:true}
      capacity: ${APP_RATE_LIMIT_AUTH_CAPACITY:10}
      window: ${APP_RATE_LIMIT_AUTH_WINDOW:PT1M}
