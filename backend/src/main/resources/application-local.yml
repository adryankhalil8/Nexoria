spring:
  config:
    activate:
      on-profile: local
  datasource:
    url: jdbc:h2:file:./data/nexoria-local;MODE=MySQL;AUTO_SERVER=TRUE;DB_CLOSE_DELAY=-1
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: none

management:
  endpoint:
    health:
      show-details: always

app:
  security:
    headers:
      hsts-enabled: false
