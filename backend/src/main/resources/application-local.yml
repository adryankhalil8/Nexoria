spring:
  config:
    activate:
      on-profile: local
  datasource:
    url: jdbc:h2:file:./data/nexoria-local;MODE=MySQL;AUTO_SERVER=TRUE;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect

management:
  endpoint:
    health:
      show-details: always

app:
  security:
    headers:
      hsts-enabled: false
