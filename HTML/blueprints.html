<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Recent Blueprints | Nexoria</title>
  <style>
    :root{--primary:#3b82f6;--accent:#f97316;--bg:#f8fafc;--text:#0f172a;--muted:#64748b;--card:#fff;}
    *{box-sizing:border-box;margin:0;padding:0;
      font-family:system-ui,-apple-system,'Segoe UI',sans-serif;}
    body{background:var(--bg);color:var(--text);min-height:100vh;}

    .page-header{
      background:linear-gradient(135deg,#0f172a,#1e3a8a);
      padding:2rem 2.5rem;display:flex;align-items:center;
      justify-content:space-between;gap:1rem;flex-wrap:wrap;
    }
    .page-header h1{color:#fff;font-size:1.5rem;font-weight:900;letter-spacing:-.02em;}
    .page-header a{color:rgba(255,255,255,.8);font-weight:700;text-decoration:none;}
    .page-header a:hover{color:#fff;}

    .page-body{max-width:1100px;margin:2.5rem auto;padding:0 1.5rem 4rem;}

    /* Filters */
    .filters-bar{
      background:var(--card);border-radius:14px;
      padding:1.25rem 1.5rem;box-shadow:0 4px 16px rgba(0,0,0,.05);
      display:flex;flex-wrap:wrap;gap:1rem;align-items:center;
      margin-bottom:2rem;
    }
    .filters-bar label{font-weight:700;font-size:.9rem;color:var(--muted);}
    .filters-bar select, .filters-bar input[type=number]{
      padding:.6rem .9rem;border-radius:10px;border:1px solid #e2e8f0;
      font-size:.9rem;background:#fff;min-width:140px;
    }
    .filters-bar .filter-group{display:flex;flex-direction:column;gap:.3rem;}
    .retainer-toggle{display:flex;align-items:center;gap:.6rem;cursor:pointer;font-weight:700;}
    .retainer-toggle input{width:18px;height:18px;accent-color:var(--primary);}

    /* Grid */
    .bp-grid{
      display:grid;
      grid-template-columns:repeat(auto-fill,minmax(300px,1fr));
      gap:1.25rem;
    }
    .bp-card{
      background:var(--card);border-radius:18px;
      padding:1.5rem;box-shadow:0 6px 20px rgba(0,0,0,.06);
      border:1px solid #eef2f7;text-decoration:none;color:var(--text);
      display:block;transition:transform .15s,box-shadow .15s;
    }
    .bp-card:hover{transform:translateY(-3px);box-shadow:0 12px 30px rgba(0,0,0,.1);}

    .bp-card-top{display:flex;gap:1rem;align-items:flex-start;margin-bottom:.75rem;}
    .bp-score{font-size:2rem;font-weight:900;letter-spacing:-.03em;line-height:1;}
    .bp-score span{font-size:.9rem;font-weight:700;opacity:.5;}
    .bp-card-meta{flex:1;}
    .bp-url{font-weight:800;font-size:.95rem;word-break:break-all;margin-bottom:.25rem;}
    .bp-industry{color:var(--muted);font-size:.85rem;font-weight:600;}
    .bp-revenue{color:var(--muted);font-size:.82rem;}

    .bp-retainer-tag{
      display:inline-block;background:#dcfce7;color:#166534;
      border-radius:8px;padding:.3rem .65rem;font-weight:800;
      font-size:.8rem;margin-bottom:.6rem;
    }
    .bp-fixes-preview{
      list-style:none;padding:0;margin:.5rem 0;
      font-size:.85rem;color:var(--muted);
    }
    .bp-fixes-preview li{padding:.2rem 0;border-bottom:1px solid #f1f5f9;}
    .bp-fixes-preview li::before{content:"→ ";}
    .bp-date{font-size:.78rem;color:#94a3b8;margin-top:.75rem;}

    .bp-empty{color:var(--muted);padding:3rem;text-align:center;font-size:1.1rem;}
    .bp-empty a{color:var(--primary);font-weight:700;}
    .bp-loading{color:var(--muted);padding:2rem;}

    /* Pagination */
    .pager{
      display:flex;justify-content:center;align-items:center;
      gap:1rem;margin-top:2rem;
    }
    .pager button{
      padding:.7rem 1.3rem;border-radius:10px;border:1px solid #e2e8f0;
      background:#fff;font-weight:800;cursor:pointer;font-size:.9rem;
      transition:background .12s;
    }
    .pager button:hover:not(:disabled){background:#eef2ff;}
    .pager button:disabled{opacity:.4;cursor:not-allowed;}
    #bpPageInfo{font-weight:700;color:var(--muted);}

    .bp-error{color:#ef4444;font-weight:700;padding:1rem;}
  </style>
</head>
<body>

<div class="page-header">
  <h1>📋 Recent Blueprints</h1>
  <div style="display:flex;gap:1.5rem;">
    <a href="index.html#diagnostic">+ Generate New</a>
    <a href="index.html">← Home</a>
  </div>
</div>

<main class="page-body">

  <div class="filters-bar">
    <div class="filter-group">
      <label for="bpIndustry">Industry</label>
      <select id="bpIndustry">
        <option value="All">All Industries</option>
        <option>Remodeling</option>
        <option>Marketing Agency</option>
        <option>Consulting</option>
        <option>E-commerce</option>
        <option>Healthcare</option>
        <option>Real Estate</option>
        <option>Tech / SaaS</option>
        <option>Other</option>
      </select>
    </div>
    <div class="filter-group">
      <label for="bpMinScore">Min Score</label>
      <input type="number" id="bpMinScore" min="0" max="100" placeholder="0" />
    </div>
    <div class="filter-group">
      <label for="bpMaxScore">Max Score</label>
      <input type="number" id="bpMaxScore" min="0" max="100" placeholder="100" />
    </div>
    <label class="retainer-toggle">
      <input type="checkbox" id="bpRetainer" />
      Retainer Ready Only
    </label>
  </div>

  <p id="bpLoading" style="color:#64748b;padding:1rem;display:none;">Loading blueprints…</p>
  <p id="bpError" class="bp-error"></p>

  <div class="bp-grid" id="blueprintsGrid"></div>

  <div class="pager">
    <button id="bpPrevBtn" type="button">← Prev</button>
    <span id="bpPageInfo">Page 1 / 1</span>
    <button id="bpNextBtn" type="button">Next →</button>
  </div>

</main>

<script src="../JS/config.js"></script>
<script src="../JS/api.js"></script>
<script src="../JS/blueprints.js"></script>
</body>
</html>
