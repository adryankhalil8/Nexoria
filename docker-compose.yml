version: '3.8'
services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: nexoria
      POSTGRES_PASSWORD: nexoria
      POSTGRES_DB: nexoria
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - '8080:8080'
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/nexoria
      SPRING_DATASOURCE_USERNAME: nexoria
      SPRING_DATASOURCE_PASSWORD: nexoria
      JWT_SECRET: change-me-please
    depends_on:
      - postgres

  frontend:
    build:
      context: frontend
      dockerfile: Dockerfile
    ports:
      - '3000:3000'
    depends_on:
      - backend

volumes:
  postgres_data:
